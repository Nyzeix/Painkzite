# GLOBAL
DESKTOP_CONFIG_DIR=/usr/share/desktop-config
DESKTOP_DATA_DIR=/usr/share/desktop-data

# WAYBAR, Status bar
WAYBAR_CONFIG_DIR=$DESKTOP_CONFIG_DIR/waybar

# SWAYNC, Notification manager
SWAYNC_CONFIG_DIR=$DESKTOP_CONFIG_DIR/swaync
SWAYNC_CONFIG_FILE=$SWAYNC_CONFIG_DIR/config.json
SWAYNC_CONFIG_STYLE=$SWAYNC_CONFIG_DIR/style.css

# MATUGEN
MATUGEN_CONFIG_DIR=$DESKTOP_CONFIG_DIR/matugen

# WALLPAPERS
WALLPAPERS_DIR=$DESKTOP_CONFIG_DIR/wallpapers


XDG_CONFIG_DIRS=${XDG_CONFIG_DIRS:+$XDG_CONFIG_DIRS:}$DESKTOP_CONFIG_DIR

